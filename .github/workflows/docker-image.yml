name: GHCR Docker Image CI/CD
on:
  push:
    tags: ["v*.*.*"] # 支持标签触发（如 v1.0.0）
  workflow_dispatch: # 支持手动触发
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 【核心权限】允许工作流将镜像推送到当前仓库的 Packages 中
    env:
      REPO_NAME: ${{ github.repository }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置小写镜像名称和版本
        run: |
          # 转换为小写（GHCR 强制要求所有路径全小写）
          LOWER_NAME=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
          echo "LOWER_NAME=$LOWER_NAME" >> $GITHUB_ENV
          
          # 判断触发方式来设置智能版本号
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v} # v1.0.0 -> 1.0.0
          else
            VERSION=manual-${GITHUB_SHA::7}   # 手动触发 -> manual-短哈希
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 登录到 GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用内置 Token，零配置

      - name: 设置 QEMU 支持多架构
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # 构建 x86_64 和 ARM64 双架构
          push: true
          tags: |
            ghcr.io/${{ env.LOWER_NAME }}:latest
            ghcr.io/${{ env.LOWER_NAME }}:${{ env.VERSION }}
